<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XtremeForums - ur #1 place 2 hang out!!!</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Verdana, Geneva, sans-serif; font-size: 12px; background: #c0c0c0; min-height: 100vh; }
.win-outer { border: 2px solid; border-color: #ffffff #808080 #808080 #ffffff; background: #c0c0c0; margin-bottom: 6px; }
.win-title { background: linear-gradient(to right, #000080, #1084d0); color: white; font-weight: bold; font-size: 11px; padding: 3px 6px; display: flex; justify-content: space-between; align-items: center; }
.btn98 { border: 2px solid; border-color: #fff #808080 #808080 #fff; background: #c0c0c0; padding: 3px 10px; font-size: 11px; cursor: pointer; }
.btn-primary { background: #000080; color: white; }
.btn-danger { background: #800000; color: white; }
.browser-bar { padding: 4px 6px; display: flex; gap: 5px; }
.forum-header { background: #000080; color: white; padding: 10px; text-align: center; }
table { border-collapse: collapse; width: 100%; }
td, th { padding: 4px 8px; }
tr.clickable:hover { background: #d0d0f0; cursor: pointer; }
.post-card { border: 2px solid #808080; margin-bottom: 8px; background: white; }
.post-head { background: #000080; color: white; padding: 3px 8px; display:flex; justify-content:space-between; }
.post-inner { display: flex; }
.avatar-col { width: 74px; background: #e8e8f0; text-align:center; }
.post-body-wrap { flex:1; padding:8px; }
textarea { width:100%; }
</style>
</head>

<body>

<script>
const SUPABASE_URL = 'https://kczrwcdjlfbojjzxdfko.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_If959z6IqdcQSjAFz-MIuA_DmwQfGBI';
</script>

<div class="browser-bar">
  <button class="btn98" onclick="goBack()">Back</button>
  <button class="btn98" onclick="reloadView()">Reload</button>
  <button class="btn98 btn-primary" onclick="openModal()">Login</button>
  <button class="btn98 btn-danger" onclick="doLogout()">Logout</button>
</div>

<div class="forum-header">
  <h1>XtremeForums</h1>
</div>

<div id="app-root"></div>

<script>
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser=null,currentProfile=null,viewStack=[],curState={view:'forum'},editingPostId=null;

/* ========= UTILS ========= */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(d){if(!d)return'???';return new Date(d).toLocaleString();}
function v(id){return (document.getElementById(id)?.value||'').trim();}

/* ========= NAV ========= */
function navigate(view,data={},push=true){
  curState={view,...data};
  if(push)viewStack.push({view,data});
  if(view==='forum')renderForum();
  if(view==='thread')renderThread(data.threadId);
  if(view==='newthread')renderNewThread(data.catId);
}
function reloadView(){navigate(curState.view,curState,false);}
function goBack(){if(viewStack.length>1){viewStack.pop();let p=viewStack.at(-1);navigate(p.view,p.data,false);}}

/* ========= AUTH ========= */
function fakeEmail(u){return u+'@fake.com';}

async function initAuth(){
  const {data:{session}}=await sb.auth.getSession();
  if(session)currentUser=session.user;
}

async function doLogin(){
  await sb.auth.signInWithPassword({email:fakeEmail(v('u')),password:v('p')});
  location.reload();
}
async function doLogout(){await sb.auth.signOut();location.reload();}
function openModal(){
  document.body.insertAdjacentHTML('beforeend',`
    <div id="m">
      <input id="u" placeholder="user">
      <input id="p" type="password">
      <button onclick="doLogin()">login</button>
    </div>
  `);
}

/* ========= FORUM ========= */
async function renderForum(){
  const root=document.getElementById('app-root');
  const {data:cats}=await sb.from('categories').select('*');
  const {data:threads}=await sb.from('threads').select('*');

  root.innerHTML=(cats||[]).map(cat=>{
    const ts=(threads||[]).filter(t=>t.category_id===cat.id);
    return `
      <div class="win-outer">
        <div class="win-title">${esc(cat.name)}</div>
        <table>
          ${ts.map(t=>`
            <tr class="clickable" onclick="navigate('thread',{threadId:${t.id}})">
              <td>${esc(t.title)}</td>
            </tr>
          `).join('')}
        </table>
        <button onclick="navigate('newthread',{catId:${cat.id}})">New Thread</button>
      </div>
    `;
  }).join('');
}

/* ========= THREAD ========= */
async function renderThread(id){
  const root=document.getElementById('app-root');
  const {data:posts}=await sb.from('posts').select('*').eq('thread_id',id);

  root.innerHTML=`
    <button onclick="navigate('forum',{})">Back</button>
    ${(posts||[]).map((p,i)=>`
      <div class="post-card">
        <div class="post-head">
          <span>#${i}</span>
        </div>
        <div class="post-inner">
          <div class="avatar-col">🙂</div>
          <div class="post-body-wrap">${esc(p.content)}</div>
        </div>
      </div>
    `).join('')}
    <textarea id="reply"></textarea>
    <button onclick="submitReply(${id})">Reply</button>
  `;
}

async function submitReply(id){
  await sb.from('posts').insert({thread_id:id,content:v('reply')});
  renderThread(id);
}

/* ========= NEW THREAD ========= */
function renderNewThread(catId){
  document.getElementById('app-root').innerHTML=`
    <input id="t">
    <textarea id="c"></textarea>
    <button onclick="submitThread(${catId})">Post</button>
  `;
}

async function submitThread(catId){
  const {data:t}=await sb.from('threads').insert({title:v('t'),category_id:catId}).select().single();
  await sb.from('posts').insert({thread_id:t.id,content:v('c')});
  navigate('thread',{threadId:t.id});
}

/* ========= START ========= */
(async()=>{
  await initAuth();
  navigate('forum');
})();
</script>

</body>
</html>
