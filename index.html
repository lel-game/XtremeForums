<script>
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ================= STATE =================
const state = {
  user: null,
  profile: null,
  view: 'forum',
  data: {},
  stack: [],
  editing: null
};

// ================= HELPERS =================
const $ = id => document.getElementById(id);
const val = id => ($(id)?.value || '').trim();

const esc = s => String(s || '')
  .replace(/[&<>"]/g, c => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;'
  }[c]));

const fmt = iso => {
  if (!iso) return '???';
  const d = new Date(iso);
  return d.toLocaleDateString('de-DE') + ' ' +
         d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
};

const html = (strings, ...vals) =>
  strings.reduce((acc, s, i) => acc + s + (vals[i] ?? ''), '');

const fakeEmail = u =>
  u.toLowerCase().replace(/[^a-z0-9]/g,'') + '@xtremeforums.fake';

// ================= API =================
const api = {
  profile: id => sb.from('profiles').select('*').eq('id', id).single(),
  categories: () => sb.from('categories').select('*').order('id'),
  threads: () => sb.from('threads')
    .select('*, profiles(username, avatar_url)')
    .order('pinned',{ascending:false})
    .order('created_at',{ascending:false}),
  postsByThread: id => sb.from('posts')
    .select('*, profiles(username, avatar_url, sig, post_count)')
    .eq('thread_id', id)
    .order('created_at'),
};

// ================= AUTH =================
async function initAuth() {
  const { data:{ session } } = await sb.auth.getSession();
  if (session) await loadProfile(session.user);

  sb.auth.onAuthStateChange(async (_, session) => {
    if (session) await loadProfile(session.user);
    else {
      state.user = state.profile = null;
      updateAuthUI();
    }
  });
}

async function loadProfile(user) {
  state.user = user;
  state.profile = (await api.profile(user.id)).data;
  updateAuthUI();
}

function updateAuthUI() {
  const logged = !!state.user;

  $('auth-btn').style.display = logged ? 'none' : '';
  $('logout-btn').style.display = logged ? '' : 'none';

  $('user-greeting').innerHTML = logged
    ? `${state.profile?.avatar_url
        ? `<img src="${esc(state.profile.avatar_url)}" style="width:18px">`
        : '👤'} ${esc(state.profile.username)}`
    : '';
}

// ================= NAV =================
function navigate(view, data={}, push=true) {
  state.view = view;
  state.data = data;
  state.editing = null;

  if (push) state.stack.push({ view, data });

  render();
}

function goBack() {
  if (state.stack.length <= 1) return;
  state.stack.pop();
  const prev = state.stack.at(-1);
  navigate(prev.view, prev.data, false);
}

function reloadView() {
  render();
}

// ================= COMPONENTS =================
const UI = {
  button: (text, onclick, cls='btn98') =>
    html`<button class="${cls}" onclick="${onclick}">${text}</button>`,

  post(post, i, threadId) {
    const pf = post.profiles || {};
    const isOwn = state.user?.id === post.author_id;
    const editing = state.editing === post.id;

    return html`
    <div class="${i ? 'reply-indent':''}">
      <div class="post-card">
        <div class="post-head">
          <span class="uname">${esc(pf.username||'???')}</span>
          <span class="meta">${fmt(post.created_at)}</span>
          ${isOwn && !editing ? html`
            <div class="post-actions">
              ${UI.button('Edit', `startEdit(${post.id})`, 'btn98 btn-sm')}
              ${UI.button('Del', `deletePost(${post.id},${threadId},${i===0})`, 'btn98 btn-sm btn-danger')}
            </div>` : ''}
        </div>

        <div class="post-inner">
          <div class="avatar-col">
            ${pf.avatar_url
              ? `<img src="${esc(pf.avatar_url)}">`
              : `<div class="avatar-placeholder">👤</div>`}
            <div class="uname-small">${esc(pf.username||'')}</div>
            <div class="post-count-label">${pf.post_count||0} posts</div>
          </div>

          <div class="post-body-wrap">
            ${editing
              ? html`
                <textarea id="edit-${post.id}" class="edit-area">${esc(post.content)}</textarea>
                ${UI.button('Save', `saveEdit(${post.id},${threadId})`, 'btn98 btn-primary btn-sm')}
                ${UI.button('Cancel', `cancelEdit(${threadId})`, 'btn98 btn-sm')}
              `
              : html`
                <div class="post-content">${esc(post.content)}</div>
                ${pf.sig ? `<div class="post-sig">${esc(pf.sig)}</div>`:''}
              `}
          </div>
        </div>
      </div>
    </div>`;
  }
};

// ================= RENDER =================
async function render() {
  if (state.view === 'forum') return renderForum();
  if (state.view === 'thread') return renderThread(state.data.threadId);
  if (state.view === 'newthread') return renderNewThread(state.data.catId);
}

async function renderForum() {
  const root = $('app-root');
  root.innerHTML = 'loading...';

  const [{data:cats},{data:threads}] = await Promise.all([
    api.categories(),
    api.threads()
  ]);

  root.innerHTML = cats.map(cat => {
    const ts = threads.filter(t => t.category_id === cat.id);

    return html`
    <div class="win-outer">
      <div class="win-title">${esc(cat.name)}</div>
      <table>
        ${ts.map(t => html`
          <tr class="clickable" onclick="navigate('thread',{threadId:${t.id}})">
            <td><b>${esc(t.title)}</b></td>
            <td>${esc(t.profiles?.username||'')}</td>
            <td>${fmt(t.created_at)}</td>
          </tr>`).join('')}
      </table>
    </div>`;
  }).join('');
}

async function renderThread(id) {
  const root = $('app-root');
  root.innerHTML = 'loading thread...';

  const [{data:thread},{data:posts}] = await Promise.all([
    sb.from('threads').select('*').eq('id',id).single(),
    api.postsByThread(id)
  ]);

  root.innerHTML = html`
    <button onclick="navigate('forum')">← Back</button>
    <h3>${esc(thread.title)}</h3>
    ${posts.map((p,i)=>UI.post(p,i,id)).join('')}
  `;
}

// ================= POST ACTIONS =================
function startEdit(id){ state.editing=id; render(); }
function cancelEdit(){ state.editing=null; render(); }

async function saveEdit(id,threadId){
  const content = val(`edit-${id}`);
  if(!content) return alert('empty!!!');

  await sb.from('posts')
    .update({content})
    .eq('id',id);

  state.editing=null;
  render();
}

// ================= INIT =================
document.addEventListener('keydown', e=>{
  if(e.key==='Escape') closeModal();
});

(async ()=>{
  await initAuth();
  navigate('forum');
})();
</script>
